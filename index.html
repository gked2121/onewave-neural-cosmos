<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneWave AI — Neural Cosmos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            cursor: crosshair;
            color: #fff;
        }

        canvas { display: block; }

        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        #logo {
            position: fixed;
            top: 36px;
            left: 40px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            animation: fadeIn 1.5s ease 0.5s forwards;
        }

        #logo svg {
            width: 38px;
            height: 38px;
        }

        #logo span {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #center-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            animation: fadeIn 2s ease 1s forwards;
        }

        #center-text h1 {
            font-size: clamp(32px, 6vw, 72px);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        #center-text p {
            font-size: clamp(14px, 2vw, 18px);
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #stats {
            position: fixed;
            bottom: 36px;
            left: 40px;
            z-index: 20;
            display: flex;
            gap: 40px;
            opacity: 0;
            animation: fadeIn 1.5s ease 1.5s forwards;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        #controls {
            position: fixed;
            bottom: 36px;
            right: 40px;
            z-index: 20;
            display: flex;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 1.5s ease 2s forwards;
        }

        .ctrl-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255,255,255,0.7);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 100px;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(167,139,250,0.4);
            color: #fff;
        }

        .ctrl-btn.active {
            background: rgba(99,102,241,0.2);
            border-color: rgba(99,102,241,0.5);
            color: #a78bfa;
        }

        #hint {
            position: fixed;
            top: 36px;
            right: 40px;
            z-index: 20;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            opacity: 0;
            animation: fadeIn 1.5s ease 2.5s forwards, fadeOut 2s ease 8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }

        /* Vignette */
        #overlay::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
        }
    </style>
</head>
<body>

<div id="overlay"></div>

<div id="logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#6366f1"/>
            </linearGradient>
        </defs>
        <circle cx="20" cy="20" r="18" stroke="url(#g1)" stroke-width="2.5" fill="none"/>
        <path d="M12 24 C12 24, 16 12, 20 18 C24 24, 28 14, 28 14" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span>OneWave AI</span>
</div>

<div id="center-text">
    <h1>Neural Cosmos</h1>
    <p>Move your cursor to explore</p>
</div>

<div id="stats">
    <div class="stat">
        <span class="stat-value" id="nodeCount">0</span>
        <span class="stat-label">Nodes</span>
    </div>
    <div class="stat">
        <span class="stat-value" id="connectionCount">0</span>
        <span class="stat-label">Connections</span>
    </div>
    <div class="stat">
        <span class="stat-value" id="fpsCount">60</span>
        <span class="stat-label">FPS</span>
    </div>
</div>

<div id="controls">
    <button class="ctrl-btn active" onclick="setMode('galaxy')">Galaxy</button>
    <button class="ctrl-btn" onclick="setMode('helix')">DNA Helix</button>
    <button class="ctrl-btn" onclick="setMode('sphere')">Sphere</button>
    <button class="ctrl-btn" onclick="setMode('wave')">Wave</button>
    <button class="ctrl-btn" onclick="togglePulse(this)">Pulse</button>
</div>

<div id="hint">Click & drag to orbit • Scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── CONFIG ────────────────────────────────────────────
const PARTICLE_COUNT = 4000;
const CONNECTION_DISTANCE = 2.2;
const MOUSE_INFLUENCE = 3.0;
const PALETTE = [
    new THREE.Color(0xa78bfa), // purple
    new THREE.Color(0x6366f1), // indigo
    new THREE.Color(0x818cf8), // light indigo
    new THREE.Color(0xc4b5fd), // lavender
    new THREE.Color(0x4f46e5), // deep indigo
    new THREE.Color(0x7c3aed), // violet
];

// ─── SCENE SETUP ───────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.035);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000);
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// ─── MOUSE / ORBIT CONTROLS (custom lightweight) ──────
const mouse = new THREE.Vector2(0, 0);
const mouse3D = new THREE.Vector3(0, 0, 0);
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let orbitAngle = { x: 0, y: 0 };
let targetOrbit = { x: 0, y: 0 };
let zoomLevel = 18;
let targetZoom = 18;

window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    mouse3D.set(mouse.x * 8, mouse.y * 5, 0);

    if (isDragging) {
        const dx = e.clientX - prevMouse.x;
        const dy = e.clientY - prevMouse.y;
        targetOrbit.x += dx * 0.005;
        targetOrbit.y += dy * 0.003;
        targetOrbit.y = Math.max(-1.2, Math.min(1.2, targetOrbit.y));
    }
    prevMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mousedown', (e) => {
    isDragging = true;
    prevMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('wheel', (e) => {
    targetZoom += e.deltaY * 0.01;
    targetZoom = Math.max(6, Math.min(35, targetZoom));
});

// Touch support
window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(t.clientY / window.innerHeight) * 2 + 1;
    mouse3D.set(mouse.x * 8, mouse.y * 5, 0);
}, { passive: true });

// ─── PARTICLES ─────────────────────────────────────────
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const originalPositions = new Float32Array(PARTICLE_COUNT * 3);

// Initial galaxy spiral positions
for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const angle = (i / PARTICLE_COUNT) * Math.PI * 12;
    const radius = Math.sqrt(i / PARTICLE_COUNT) * 10;
    const armOffset = ((i % 3) / 3) * Math.PI * 2;
    const jitter = (Math.random() - 0.5) * 1.5;

    positions[i3] = Math.cos(angle + armOffset) * radius + jitter;
    positions[i3 + 1] = (Math.random() - 0.5) * 1.5;
    positions[i3 + 2] = Math.sin(angle + armOffset) * radius + jitter;

    originalPositions[i3] = positions[i3];
    originalPositions[i3 + 1] = positions[i3 + 1];
    originalPositions[i3 + 2] = positions[i3 + 2];

    targetPositions[i3] = positions[i3];
    targetPositions[i3 + 1] = positions[i3 + 1];
    targetPositions[i3 + 2] = positions[i3 + 2];

    const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    colors[i3] = color.r;
    colors[i3 + 1] = color.g;
    colors[i3 + 2] = color.b;

    sizes[i] = Math.random() * 3 + 1;

    velocities[i3] = 0;
    velocities[i3 + 1] = 0;
    velocities[i3 + 2] = 0;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Custom shader material for particles
const particleMaterial = new THREE.ShaderMaterial({
    uniforms: {
        uTime: { value: 0 },
        uPixelRatio: { value: renderer.getPixelRatio() },
        uMouse: { value: new THREE.Vector3() },
        uPulse: { value: 0.0 }
    },
    vertexShader: `
        attribute float size;
        attribute vec3 color;
        varying vec3 vColor;
        varying float vDist;
        uniform float uTime;
        uniform float uPixelRatio;
        uniform vec3 uMouse;
        uniform float uPulse;

        void main() {
            vColor = color;
            vec3 pos = position;

            // Mouse influence
            float dist = distance(pos.xy, uMouse.xy);
            float influence = smoothstep(4.0, 0.0, dist);
            pos.z += influence * 2.0;

            // Pulse effect
            if (uPulse > 0.0) {
                float pulseDist = length(pos);
                float pulseWave = sin(pulseDist * 1.5 - uTime * 3.0) * uPulse;
                pos += normalize(pos) * pulseWave * 0.5;
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            vDist = -mvPosition.z;

            float dynamicSize = size * (1.0 + influence * 2.0);
            dynamicSize *= (1.0 + sin(uTime * 2.0 + float(gl_VertexID) * 0.1) * 0.15);

            gl_PointSize = dynamicSize * uPixelRatio * (200.0 / -mvPosition.z);
            gl_PointSize = max(gl_PointSize, 1.0);
            gl_Position = projectionMatrix * mvPosition;
        }
    `,
    fragmentShader: `
        varying vec3 vColor;
        varying float vDist;

        void main() {
            float d = length(gl_PointCoord - vec2(0.5));
            if (d > 0.5) discard;

            float alpha = 1.0 - smoothstep(0.0, 0.5, d);
            alpha *= alpha;

            // Distance fade
            float distFade = smoothstep(40.0, 5.0, vDist);

            // Glow
            vec3 glow = vColor * (1.0 + (1.0 - d * 2.0) * 0.5);

            gl_FragColor = vec4(glow, alpha * distFade * 0.9);
        }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const particles = new THREE.Points(geometry, particleMaterial);
scene.add(particles);

// ─── CONNECTION LINES ──────────────────────────────────
const MAX_CONNECTIONS = 3000;
const linePositions = new Float32Array(MAX_CONNECTIONS * 6);
const lineColors = new Float32Array(MAX_CONNECTIONS * 6);
const lineGeometry = new THREE.BufferGeometry();
lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

const lineMaterial = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
scene.add(lines);

// ─── AMBIENT PARTICLES (tiny background stars) ────────
const bgCount = 2000;
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(bgCount * 3);
for (let i = 0; i < bgCount * 3; i++) {
    bgPos[i] = (Math.random() - 0.5) * 80;
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
const bgMat = new THREE.PointsMaterial({
    size: 0.08,
    color: 0x444466,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
});
const bgStars = new THREE.Points(bgGeo, bgMat);
scene.add(bgStars);

// ─── FORMATION GENERATORS ──────────────────────────────
let currentMode = 'galaxy';
let pulseActive = false;
let morphProgress = 0;
let isMorphing = false;

function generateGalaxy(i) {
    const angle = (i / PARTICLE_COUNT) * Math.PI * 12;
    const radius = Math.sqrt(i / PARTICLE_COUNT) * 10;
    const armOffset = ((i % 3) / 3) * Math.PI * 2;
    const jitter = (Math.random() - 0.5) * 1.2;
    return [
        Math.cos(angle + armOffset) * radius + jitter,
        (Math.random() - 0.5) * 1.2,
        Math.sin(angle + armOffset) * radius + jitter
    ];
}

function generateHelix(i) {
    const t = (i / PARTICLE_COUNT) * Math.PI * 8;
    const strand = i % 2;
    const radius = 3;
    const offset = strand * Math.PI;
    const jitter = (Math.random() - 0.5) * 0.4;
    return [
        Math.cos(t + offset) * radius + jitter,
        (i / PARTICLE_COUNT - 0.5) * 18 + jitter,
        Math.sin(t + offset) * radius + jitter
    ];
}

function generateSphere(i) {
    const phi = Math.acos(1 - 2 * (i / PARTICLE_COUNT));
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    const radius = 6 + (Math.random() - 0.5) * 1.5;
    return [
        Math.sin(phi) * Math.cos(theta) * radius,
        Math.sin(phi) * Math.sin(theta) * radius,
        Math.cos(phi) * radius
    ];
}

function generateWave(i) {
    const cols = Math.ceil(Math.sqrt(PARTICLE_COUNT));
    const x = (i % cols) / cols;
    const z = Math.floor(i / cols) / cols;
    return [
        (x - 0.5) * 20,
        0,
        (z - 0.5) * 20
    ];
}

const generators = { galaxy: generateGalaxy, helix: generateHelix, sphere: generateSphere, wave: generateWave };

function setMode(mode) {
    currentMode = mode;
    isMorphing = true;
    morphProgress = 0;

    document.querySelectorAll('.ctrl-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === mode);
    });

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const pos = generators[mode](i);
        targetPositions[i * 3] = pos[0];
        targetPositions[i * 3 + 1] = pos[1];
        targetPositions[i * 3 + 2] = pos[2];
    }
}

function togglePulse(btn) {
    pulseActive = !pulseActive;
    btn.classList.toggle('active', pulseActive);
}

// Make functions available globally
window.setMode = setMode;
window.togglePulse = togglePulse;

// ─── ANIMATION LOOP ────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;
let lastFpsTime = 0;

function updateConnections() {
    let connectionIdx = 0;
    const pos = geometry.attributes.position.array;
    const col = geometry.attributes.color.array;

    // Sample subset for connections (performance)
    const sampleSize = 400;
    const step = Math.max(1, Math.floor(PARTICLE_COUNT / sampleSize));

    for (let i = 0; i < PARTICLE_COUNT && connectionIdx < MAX_CONNECTIONS; i += step) {
        for (let j = i + step; j < PARTICLE_COUNT && connectionIdx < MAX_CONNECTIONS; j += step) {
            const dx = pos[i * 3] - pos[j * 3];
            const dy = pos[i * 3 + 1] - pos[j * 3 + 1];
            const dz = pos[i * 3 + 2] - pos[j * 3 + 2];
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

            if (dist < CONNECTION_DISTANCE) {
                const alpha = 1 - dist / CONNECTION_DISTANCE;
                const ci = connectionIdx * 6;

                linePositions[ci] = pos[i * 3];
                linePositions[ci + 1] = pos[i * 3 + 1];
                linePositions[ci + 2] = pos[i * 3 + 2];
                linePositions[ci + 3] = pos[j * 3];
                linePositions[ci + 4] = pos[j * 3 + 1];
                linePositions[ci + 5] = pos[j * 3 + 2];

                lineColors[ci] = col[i * 3] * alpha;
                lineColors[ci + 1] = col[i * 3 + 1] * alpha;
                lineColors[ci + 2] = col[i * 3 + 2] * alpha;
                lineColors[ci + 3] = col[j * 3] * alpha;
                lineColors[ci + 4] = col[j * 3 + 1] * alpha;
                lineColors[ci + 5] = col[j * 3 + 2] * alpha;

                connectionIdx++;
            }
        }
    }

    // Zero out remaining
    for (let i = connectionIdx * 6; i < MAX_CONNECTIONS * 6; i++) {
        linePositions[i] = 0;
        lineColors[i] = 0;
    }

    lineGeometry.attributes.position.needsUpdate = true;
    lineGeometry.attributes.color.needsUpdate = true;
    lineGeometry.setDrawRange(0, connectionIdx * 2);

    return connectionIdx;
}

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();
    const delta = Math.min(clock.getDelta(), 0.05);

    // FPS counter
    frameCount++;
    if (elapsed - lastFpsTime >= 0.5) {
        document.getElementById('fpsCount').textContent = Math.round(frameCount / (elapsed - lastFpsTime));
        frameCount = 0;
        lastFpsTime = elapsed;
    }

    // Smooth orbit
    orbitAngle.x += (targetOrbit.x - orbitAngle.x) * 0.05;
    orbitAngle.y += (targetOrbit.y - orbitAngle.y) * 0.05;
    zoomLevel += (targetZoom - zoomLevel) * 0.08;

    // Auto-rotate when not dragging
    if (!isDragging) {
        targetOrbit.x += 0.001;
    }

    camera.position.x = Math.sin(orbitAngle.x) * Math.cos(orbitAngle.y) * zoomLevel;
    camera.position.y = Math.sin(orbitAngle.y) * zoomLevel * 0.5 + 2;
    camera.position.z = Math.cos(orbitAngle.x) * Math.cos(orbitAngle.y) * zoomLevel;
    camera.lookAt(0, 0, 0);

    // Update uniforms
    particleMaterial.uniforms.uTime.value = elapsed;
    particleMaterial.uniforms.uMouse.value.copy(mouse3D);
    particleMaterial.uniforms.uPulse.value = pulseActive ? 1.0 : 0.0;

    // Morph particles toward targets
    const pos = geometry.attributes.position.array;
    const morphSpeed = 0.03;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;

        // Smooth morphing
        pos[i3] += (targetPositions[i3] - pos[i3]) * morphSpeed;
        pos[i3 + 1] += (targetPositions[i3 + 1] - pos[i3 + 1]) * morphSpeed;
        pos[i3 + 2] += (targetPositions[i3 + 2] - pos[i3 + 2]) * morphSpeed;

        // Mode-specific animations
        if (currentMode === 'wave') {
            const cols = Math.ceil(Math.sqrt(PARTICLE_COUNT));
            const x = (i % cols) / cols;
            const z = Math.floor(i / cols) / cols;
            pos[i3 + 1] = Math.sin(x * 8 + elapsed * 1.5) * Math.cos(z * 8 + elapsed * 1.2) * 1.5;
        }

        if (currentMode === 'galaxy') {
            // Slow spiral rotation
            const angle = elapsed * 0.1;
            const cx = pos[i3];
            const cz = pos[i3 + 2];
            const dist = Math.sqrt(cx * cx + cz * cz);
            const speed = 0.02 / (dist * 0.1 + 1);
            const cos = Math.cos(speed);
            const sin = Math.sin(speed);
            targetPositions[i3] = cx * cos - cz * sin;
            targetPositions[i3 + 2] = cx * sin + cz * cos;
        }

        if (currentMode === 'helix') {
            targetPositions[i3 + 1] += 0.01;
            if (targetPositions[i3 + 1] > 9) targetPositions[i3 + 1] = -9;
        }
    }

    geometry.attributes.position.needsUpdate = true;

    // Update connections
    const connCount = updateConnections();

    // Background star rotation
    bgStars.rotation.y = elapsed * 0.02;
    bgStars.rotation.x = elapsed * 0.01;

    // Update stats
    document.getElementById('nodeCount').textContent = PARTICLE_COUNT.toLocaleString();
    document.getElementById('connectionCount').textContent = connCount.toLocaleString();

    renderer.render(scene, camera);
}

// ─── RESIZE ────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
});

// ─── START ─────────────────────────────────────────────
animate();
</script>
</body>
</html>
