<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:#fff}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
canvas{display:block;position:fixed;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#logo{position:fixed;top:32px;left:32px;display:flex;align-items:center;gap:12px;z-index:20}
#logo svg{width:36px;height:36px}

@keyframes titleFade{0%{opacity:0;transform:translate(-50%,-50%) scale(0.95)}50%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0.15;transform:translate(-50%,-50%) scale(1)}}
#modes{position:fixed;bottom:32px;right:32px;display:flex;gap:8px;z-index:20;pointer-events:all}
.mode-btn{padding:8px 16px;border:1px solid rgba(255,255,255,0.15);border-radius:20px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:12px;font-family:inherit;letter-spacing:1px;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px)}
.mode-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.3)}
.mode-btn.active{background:linear-gradient(135deg,rgba(129,140,248,0.3),rgba(6,182,212,0.3));border-color:rgba(129,140,248,0.5);color:#fff}
#stats{position:fixed;bottom:32px;left:32px;display:flex;gap:32px;z-index:20}
.stat{text-align:left}
.stat-val{font-size:20px;font-weight:600;background:linear-gradient(135deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

#sound-btn{position:fixed;top:32px;right:32px;z-index:20;pointer-events:all;padding:8px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:16px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.4);font-size:11px;font-family:inherit;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.3s}
#sound-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}
</style>
</head>
<body>
<div id="ui">
<div id="logo"><svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16" stroke="url(#lg)" stroke-width="1.5"/><path d="M10 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round"/><path d="M13 18c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round"/><circle cx="18" cy="18" r="2" fill="url(#lg)"/><defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs></svg><span>ONEWAVE AI</span></div>
<div id="title"><h1>Neural Cosmos</h1><p>Interactive Particle Universe</p></div>
<div id="stats"><div class="stat"><div class="stat-val" id="nc">0</div><div class="stat-label">Particles</div></div><div class="stat"><div class="stat-val" id="cc">0</div><div class="stat-label">Connections</div></div><div class="stat"><div class="stat-val" id="fp">0</div><div class="stat-label">FPS</div></div></div>
<div id="modes"></div>
<button id="sound-btn" onclick="toggleSound()">Sound Off</button>
</div>
<script>
const MODES=['Galaxy','Nebula','DNA Helix','Neural Net','Wave','Vortex'];
let currentMode=0,targetPositions,transitioning=false,transitionProgress=1;
const N=5000,mouse={x:0,y:0,active:false},clock=new THREE.Clock();
let scene,camera,renderer,particles,positions,colors,sizes,velocities;
let audioCtx,gainNode,soundOn=false,frameCount=0,lastFps=0,lastTime=performance.now();
const modesDiv=document.getElementById('modes');
MODES.forEach((m,i)=>{const b=document.createElement('button');b.className='mode-btn'+(i===0?' active':'');b.textContent=m;b.onclick=()=>switchMode(i);modesDiv.appendChild(b)});
scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x050510,0.0008);
camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,1,5000);
camera.position.set(0,100,400);
renderer=new THREE.WebGLRenderer({antialias:false,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x050510);
document.body.appendChild(renderer.domElement);
const geo=new THREE.BufferGeometry();
positions=new Float32Array(N*3);colors=new Float32Array(N*3);sizes=new Float32Array(N);velocities=new Float32Array(N*3);targetPositions=new Float32Array(N*3);
const phases=new Float32Array(N);
const palette=[new THREE.Color('#818cf8'),new THREE.Color('#06b6d4'),new THREE.Color('#a78bfa'),new THREE.Color('#ec4899'),new THREE.Color('#22d3ee'),new THREE.Color('#f472b6')];
for(let i=0;i<N;i++){const i3=i*3;positions[i3]=Math.random()*800-400;positions[i3+1]=Math.random()*800-400;positions[i3+2]=Math.random()*800-400;const c=palette[Math.floor(Math.random()*palette.length)];colors[i3]=c.r;colors[i3+1]=c.g;colors[i3+2]=c.b;sizes[i]=Math.random()*3+1;phases[i]=Math.random()*Math.PI*2;velocities[i3]=(Math.random()-0.5)*0.2;velocities[i3+1]=(Math.random()-0.5)*0.2;velocities[i3+2]=(Math.random()-0.5)*0.2}
geo.setAttribute('position',new THREE.BufferAttribute(positions,3));geo.setAttribute('color',new THREE.BufferAttribute(colors,3));geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
const vertexShader='attribute float size;varying vec3 vColor;varying float vAlpha;void main(){vColor=color;vec4 mvPos=modelViewMatrix*vec4(position,1.0);gl_PointSize=size*(300.0/-mvPos.z);gl_Position=projectionMatrix*mvPos;vAlpha=clamp(1.0-length(mvPos.xyz)/2000.0,0.1,1.0);}';
const fragmentShader='varying vec3 vColor;varying float vAlpha;void main(){float d=length(gl_PointCoord-vec2(0.5));if(d>0.5)discard;float a=smoothstep(0.5,0.1,d)*vAlpha*0.85;gl_FragColor=vec4(vColor,a);}';
const mat=new THREE.ShaderMaterial({vertexShader,fragmentShader,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,vertexColors:true});
particles=new THREE.Points(geo,mat);scene.add(particles);
const starGeo=new THREE.BufferGeometry();const starPos=new Float32Array(2000*3);const starSizes=new Float32Array(2000);
for(let i=0;i<2000;i++){starPos[i*3]=(Math.random()-0.5)*4000;starPos[i*3+1]=(Math.random()-0.5)*4000;starPos[i*3+2]=(Math.random()-0.5)*4000;starSizes[i]=Math.random()*1.5+0.3}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));starGeo.setAttribute('size',new THREE.BufferAttribute(starSizes,1));
const starMat=new THREE.ShaderMaterial({vertexShader:'attribute float size;varying float vA;void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=size*(200.0/-mv.z);gl_Position=projectionMatrix*mv;vA=clamp(1.0-length(mv.xyz)/3000.0,0.0,0.6);}',fragmentShader:'varying float vA;void main(){float d=length(gl_PointCoord-vec2(0.5));if(d>0.5)discard;gl_FragColor=vec4(0.7,0.75,0.9,smoothstep(0.5,0.0,d)*vA*0.4);}',transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
scene.add(new THREE.Points(starGeo,starMat));
const lineGeo=new THREE.BufferGeometry();const linePos=new Float32Array(5000*2*3);const lineColors=new Float32Array(5000*2*3);
lineGeo.setAttribute('position',new THREE.BufferAttribute(linePos,3));lineGeo.setAttribute('color',new THREE.BufferAttribute(lineColors,3));
const lineMat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.15,blending:THREE.AdditiveBlending,depthWrite:false});
const lines=new THREE.LineSegments(lineGeo,lineMat);scene.add(lines);
function generateMode(mode){const t=new Float32Array(N*3);for(let i=0;i<N;i++){const i3=i*3;const a=Math.random()*Math.PI*2,b=Math.random()*Math.PI*2;switch(mode){case 0:{const r=Math.random()*200+20,h=(Math.random()-0.5)*20*Math.exp(-r/150);t[i3]=Math.cos(a+r*0.03)*r;t[i3+1]=h;t[i3+2]=Math.sin(a+r*0.03)*r;break}case 1:{const r=Math.pow(Math.random(),0.5)*250;t[i3]=Math.cos(a)*Math.sin(b)*r+(Math.random()-0.5)*40;t[i3+1]=Math.sin(a)*Math.sin(b)*r+(Math.random()-0.5)*40;t[i3+2]=Math.cos(b)*r+(Math.random()-0.5)*40;break}case 2:{const s=i/N*Math.PI*8,r=50;const strand=i%2===0?1:-1;t[i3]=Math.cos(s)*r*strand;t[i3+1]=(i/N-0.5)*400;t[i3+2]=Math.sin(s)*r*strand;break}case 3:{const cluster=Math.floor(Math.random()*8);const cx=(cluster%4-1.5)*120,cy=Math.floor(cluster/4)*120-60;t[i3]=cx+(Math.random()-0.5)*80;t[i3+1]=cy+(Math.random()-0.5)*80;t[i3+2]=(Math.random()-0.5)*80;break}case 4:{const x=(i%100-50)*4,z=(Math.floor(i/100)-25)*4;t[i3]=x;t[i3+1]=Math.sin(x*0.05)*30+Math.cos(z*0.05)*30;t[i3+2]=z;break}case 5:{const r2=Math.random()*180+20,angle=a+r2*0.08;t[i3]=Math.cos(angle)*r2;t[i3+1]=(Math.random()-0.5)*r2*0.5;t[i3+2]=Math.sin(angle)*r2;break}}}return t}
targetPositions=generateMode(0);for(let i=0;i<N*3;i++)positions[i]=targetPositions[i];
function switchMode(idx){if(idx===currentMode&&!transitioning)return;currentMode=idx;targetPositions=generateMode(idx);transitioning=true;transitionProgress=0;document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===idx))}
let camAutoOrbit=true,mouseDown=false,lastMX=0,lastMY=0,camTheta=0,camPhi=Math.PI/6,camDist=400;
window.addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;mouse.active=true;if(mouseDown){camTheta-=(e.clientX-lastMX)*0.005;camPhi-=(e.clientY-lastMY)*0.005;camPhi=Math.max(-Math.PI/2+0.1,Math.min(Math.PI/2-0.1,camPhi));camAutoOrbit=false;lastMX=e.clientX;lastMY=e.clientY}});
window.addEventListener('mousedown',e=>{mouseDown=true;lastMX=e.clientX;lastMY=e.clientY});
window.addEventListener('mouseup',()=>{mouseDown=false;setTimeout(()=>camAutoOrbit=true,5000)});
window.addEventListener('wheel',e=>{camDist+=e.deltaY*0.5;camDist=Math.max(100,Math.min(1200,camDist))});
window.addEventListener('touchmove',e=>{const t=e.touches[0];mouse.x=(t.clientX/innerWidth)*2-1;mouse.y=-(t.clientY/innerHeight)*2+1;mouse.active=true},{passive:true});
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
function toggleSound(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();soundOn=!soundOn;document.getElementById('sound-btn').textContent=soundOn?'Sound On':'Sound Off';if(soundOn){gainNode=audioCtx.createGain();gainNode.gain.value=0.03;gainNode.connect(audioCtx.destination);const osc1=audioCtx.createOscillator();osc1.type='sine';osc1.frequency.value=110;osc1.connect(gainNode);osc1.start();const osc2=audioCtx.createOscillator();osc2.type='sine';osc2.frequency.value=165;osc2.connect(gainNode);osc2.start();window._oscs=[osc1,osc2]}else if(window._oscs){window._oscs.forEach(o=>o.stop());gainNode.disconnect()}}
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
if(camAutoOrbit)camTheta+=0.002;
camera.position.x=Math.cos(camTheta)*Math.cos(camPhi)*camDist;camera.position.y=Math.sin(camPhi)*camDist;camera.position.z=Math.sin(camTheta)*Math.cos(camPhi)*camDist;camera.lookAt(0,0,0);
if(transitioning){transitionProgress+=0.015;if(transitionProgress>=1){transitionProgress=1;transitioning=false}const ease=transitionProgress<0.5?4*transitionProgress*transitionProgress*transitionProgress:1-Math.pow(-2*transitionProgress+2,3)/2;for(let i=0;i<N*3;i++)positions[i]+=(targetPositions[i]-positions[i])*ease*0.05}
let conns=0;const lp=lineGeo.attributes.position.array;const lc=lineGeo.attributes.color.array;
for(let i=0;i<N;i++){const i3=i*3;const p=phases[i]+t;
if(currentMode===0){positions[i3]+=Math.sin(p*0.5)*0.1;positions[i3+1]+=Math.cos(p*0.3)*0.05}
else if(currentMode===4){positions[i3+1]=targetPositions[i3+1]+Math.sin(t*2+positions[i3]*0.02)*15+Math.cos(t*1.5+positions[i3+2]*0.02)*15}
else if(currentMode===2){const s=i/N*Math.PI*8+t*0.5;const strand=i%2===0?1:-1;positions[i3]=Math.cos(s)*50*strand;positions[i3+2]=Math.sin(s)*50*strand}
else if(currentMode===5){const angle=t*0.3;positions[i3]=targetPositions[i3]*Math.cos(angle*0.1)-targetPositions[i3+2]*Math.sin(angle*0.1);positions[i3+2]=targetPositions[i3]*Math.sin(angle*0.1)+targetPositions[i3+2]*Math.cos(angle*0.1)}
if(mouse.active){const ray=new THREE.Vector3(mouse.x,mouse.y,0.5).unproject(camera);const dir=ray.sub(camera.position).normalize();const dist=new THREE.Vector3(positions[i3],positions[i3+1],positions[i3+2]).sub(camera.position);const proj=dist.dot(dir);const closest=camera.position.clone().add(dir.multiplyScalar(proj));const d=new THREE.Vector3(positions[i3]-closest.x,positions[i3+1]-closest.y,positions[i3+2]-closest.z);const dl=d.length();if(dl<80&&dl>0.1){const force=0.5*(1-dl/80);positions[i3]+=d.x/dl*force;positions[i3+1]+=d.y/dl*force;positions[i3+2]+=d.z/dl*force}}
sizes[i]=Math.max(1,(Math.sin(p*2+t)*0.5+2));
const ci=Math.floor((i+t*10)%palette.length);const nc=palette[ci];colors[i3]+=(nc.r-colors[i3])*0.001;colors[i3+1]+=(nc.g-colors[i3+1])*0.001;colors[i3+2]+=(nc.b-colors[i3+2])*0.001;
if(i<500&&conns<2500){for(let j=i+1;j<Math.min(i+20,500);j++){const j3=j*3;const dx=positions[i3]-positions[j3],dy=positions[i3+1]-positions[j3+1],dz=positions[i3+2]-positions[j3+2];const d2=dx*dx+dy*dy+dz*dz;if(d2<3000){const ci6=conns*6;lp[ci6]=positions[i3];lp[ci6+1]=positions[i3+1];lp[ci6+2]=positions[i3+2];lp[ci6+3]=positions[j3];lp[ci6+4]=positions[j3+1];lp[ci6+5]=positions[j3+2];const a=(1-d2/3000)*0.5;lc[ci6]=colors[i3]*a;lc[ci6+1]=colors[i3+1]*a;lc[ci6+2]=colors[i3+2]*a;lc[ci6+3]=colors[j3]*a;lc[ci6+4]=colors[j3+1]*a;lc[ci6+5]=colors[j3+2]*a;conns++}}}}
lineGeo.setDrawRange(0,conns*2);geo.attributes.position.needsUpdate=true;geo.attributes.color.needsUpdate=true;geo.attributes.size.needsUpdate=true;lineGeo.attributes.position.needsUpdate=true;lineGeo.attributes.color.needsUpdate=true;
frameCount++;const now=performance.now();if(now-lastTime>=1000){lastFps=frameCount;frameCount=0;lastTime=now}
document.getElementById('nc').textContent=N.toLocaleString();document.getElementById('cc').textContent=conns.toLocaleString();document.getElementById('fp').textContent=lastFps;
renderer.render(scene,camera)}
animate();
</script>
</body>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneWave AI — Neural Cosmos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#fff;cursor:crosshair}
canvas{display:block;position:fixed;top:0;left:0}

#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui *{pointer-events:auto}

/* Branding */
#brand{position:fixed;top:24px;left:28px;display:flex;align-items:center;gap:12px;z-index:20}
#brand svg{width:36px;height:36px;filter:drop-shadow(0 0 12px rgba(99,102,241,0.5))}
#brand h1{font-size:18px;font-weight:600;letter-spacing:1.5px;
  background:linear-gradient(135deg,#818cf8,#6366f1,#a78bfa,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-transform:uppercase}
#brand span{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;display:block;margin-top:2px}

/* Mode Selector */
#modes{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:6px;
  background:rgba(15,15,25,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:6px;z-index:20}
.mode-btn{padding:10px 20px;border:none;background:transparent;color:rgba(255,255,255,0.5);
  font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  border-radius:12px;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);white-space:nowrap}
.mode-btn:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.05)}
.mode-btn.active{color:#fff;background:linear-gradient(135deg,rgba(99,102,241,0.3),rgba(168,85,247,0.3));
  box-shadow:0 0 20px rgba(99,102,241,0.2),inset 0 0 20px rgba(99,102,241,0.1)}

/* Stats */
#stats{position:fixed;top:24px;right:28px;text-align:right;z-index:20}
#stats div{font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.35);line-height:1.8}
#stats .val{color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums;font-weight:500}

/* Controls */
#controls{position:fixed;top:50%;right:28px;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:20}
.ctrl-btn{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(15,15,25,0.5);backdrop-filter:blur(12px);color:rgba(255,255,255,0.5);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease}
.ctrl-btn:hover{border-color:rgba(99,102,241,0.4);color:#fff;background:rgba(99,102,241,0.15)}
.ctrl-btn.active{border-color:rgba(99,102,241,0.5);color:#a78bfa;background:rgba(99,102,241,0.2)}

/* Info tooltip */
#info{position:fixed;bottom:32px;right:28px;font-size:10px;color:rgba(255,255,255,0.25);
  letter-spacing:1px;text-transform:uppercase;z-index:20;text-align:right;line-height:1.8}

/* Loading */
#loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#08080f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;
  transition:opacity 0.8s ease}
#loader.hide{opacity:0;pointer-events:none}

#loader .bar-fill{width:0%;height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);
  border-radius:2px;transition:width 0.3s ease}
#loader p{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:12px}

/* Mobile */
@media(max-width:768px){
  #modes{bottom:16px;gap:4px;padding:4px}
  .mode-btn{padding:8px 12px;font-size:10px}
  #brand{top:16px;left:16px}
  #brand h1{font-size:14px}
  #stats{top:16px;right:16px}
  #stats div{font-size:10px}
  #controls{right:16px}
  #info{display:none}
}
</style>
</head>
<body>

<div id="loader">
  <svg width="48" height="48" viewBox="0 0 100 100" fill="none">
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">

    <circle cx="50" cy="50" r="40" stroke="url(#lg)" stroke-width="3" fill="none" opacity="0.3"/>
    <circle cx="50" cy="50" r="25" stroke="url(#lg)" stroke-width="2" fill="none" opacity="0.5"/>
    <circle cx="50" cy="50" r="8" fill="url(#lg)" opacity="0.8"/>
  </svg>
  <div class="bar"><div class="bar-fill" id="loaderBar"></div></div>
  <p>Initializing Neural Cosmos</p>
</div>

<div id="ui">
  <div id="brand">
    <svg viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id="logo-g" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── CONFIG ───
const CONFIG = {
  particleCount: 8000,
  bgStarCount: 3000,
  connectionDistance: 1.8,
  maxConnections: 800,
  mouseRadius: 3.0,

const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);

  CONFIG.maxConnections = 300;
  CONFIG.burstCount = 80;
}

// ─── COLOR PALETTES ───
const PALETTES = [
  { a: [0.40, 0.30, 1.00], b: [0.70, 0.20, 0.90], c: [0.20, 0.60, 1.00], bg: [0.02, 0.02, 0.05] },
  { a: [0.00, 0.90, 0.80], b: [0.00, 0.50, 1.00], c: [0.30, 1.00, 0.70], bg: [0.01, 0.03, 0.04] },
  { a: [1.00, 0.40, 0.60], b: [0.90, 0.20, 0.80], c: [1.00, 0.60, 0.30], bg: [0.04, 0.01, 0.03] },
  { a: [0.60, 0.80, 0.20], b: [0.20, 1.00, 0.60], c: [0.00, 0.70, 0.90], bg: [0.02, 0.03, 0.01] },
  { a: [1.00, 0.70, 0.20], b: [1.00, 0.40, 0.40], c: [0.80, 0.60, 1.00], bg: [0.04, 0.02, 0.01] },
];

let currentPalette = 0;
let paletteT = 0;

function lerpColor(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}

function getCurrentColors() {
  const p1 = PALETTES[currentPalette];
  const p2 = PALETTES[(currentPalette + 1) % PALETTES.length];
  return {
    a: lerpColor(p1.a, p2.a, paletteT),
    b: lerpColor(p1.b, p2.b, paletteT),
    c: lerpColor(p1.c, p2.c, paletteT),
    bg: lerpColor(p1.bg, p2.bg, paletteT)
  };
}

// ─── SCENE SETUP ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3, CONFIG.cameraDistance);

const renderer = new THREE.WebGLRenderer({

});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

renderer.toneMappingExposure = 1.0;

document.body.appendChild(renderer.domElement);

controls.enableDamping = true;

controls.maxDistance = 30;
controls.autoRotate = true;

// ─── POST-PROCESSING ───
const composer = new EffectComposer(renderer);

composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  CONFIG.bloomStrength,
  CONFIG.bloomRadius,
  CONFIG.bloomThreshold
);
composer.addPass(bloomPass);

// ─── FORMATION GENERATORS ───
function generateGalaxy(count) {
  const positions = new Float32Array(count * 3);
  const arms = 4;
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const arm = i % arms;
    const armAngle = (arm / arms) * Math.PI * 2;
    const radius = Math.pow(Math.random(), 0.6) * 6;
    const spin = radius * 0.8;
    const angle = armAngle + spin;
    const scatter = (1 - Math.pow(radius / 6, 2)) * 0.8 + 0.1;
    positions[i3] = Math.cos(angle) * radius + (Math.random() - 0.5) * scatter;
    positions[i3+1] = (Math.random() - 0.5) * scatter * 0.4;
    positions[i3+2] = Math.sin(angle) * radius + (Math.random() - 0.5) * scatter;
  }
  return positions;
}

function generateDNA(count) {
  const positions = new Float32Array(count * 3);
  const length = 12;
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const t = (i / count) * length - length / 2;
    const strand = i % 3;
    if (strand < 2) {
      const angle = t * 1.2 + (strand === 0 ? 0 : Math.PI);
      const radius = 1.5;
      positions[i3] = Math.cos(angle) * radius + (Math.random()-0.5)*0.15;
      positions[i3+1] = t + (Math.random()-0.5)*0.1;
      positions[i3+2] = Math.sin(angle) * radius + (Math.random()-0.5)*0.15;
    } else {
      const angle = t * 1.2;
      const lerp = Math.random();
      const r = 1.5;
      positions[i3] = Math.cos(angle)*r*lerp + Math.cos(angle+Math.PI)*r*(1-lerp) + (Math.random()-0.5)*0.1;
      positions[i3+1] = t + (Math.random()-0.5)*0.1;
      positions[i3+2] = Math.sin(angle)*r*lerp + Math.sin(angle+Math.PI)*r*(1-lerp) + (Math.random()-0.5)*0.1;
    }
  }
  return positions;
}

function generateNeural(count) {
  const positions = new Float32Array(count * 3);
  const layers = 5;
  const nodesPerLayer = Math.floor(count / layers);
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const layer = Math.floor(i / nodesPerLayer);
    const inLayer = i % nodesPerLayer;
    const layerX = (layer / (layers-1)) * 8 - 4;
    const phi = Math.acos(2 * (inLayer / nodesPerLayer) - 1);
    const theta = Math.sqrt(nodesPerLayer * Math.PI) * phi;
    const r = 2.0 + Math.random() * 0.5;
    positions[i3] = layerX + (Math.random()-0.5)*0.5;
    positions[i3+1] = r * Math.cos(theta) * Math.sin(phi) * 0.6;
    positions[i3+2] = r * Math.sin(theta) * Math.sin(phi) * 0.6;
  }
  return positions;
}

function generateWave(count) {
  const positions = new Float32Array(count * 3);
  const gridSize = Math.ceil(Math.sqrt(count));
  const spacing = 10 / gridSize;
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const gx = (i % gridSize) * spacing - 5;
    const gz = Math.floor(i / gridSize) * spacing - 5;
    const dist = Math.sqrt(gx*gx + gz*gz);
    positions[i3] = gx;
    positions[i3+1] = Math.sin(dist * 1.5) * Math.cos(gx * 0.5) * 1.2;
    positions[i3+2] = gz;
  }
  return positions;
}

function generateNebula(count) {
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const cluster = Math.floor(Math.random() * 4);
    const cx = [2, -2, 0, 1][cluster];
    const cy = [0, 1, -1, 2][cluster];
    const cz = [-1, 1, 2, -2][cluster];
    const r = Math.pow(Math.random(), 0.5) * 3;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i3] = cx + r * Math.sin(phi) * Math.cos(theta);
    positions[i3+1] = cy + r * Math.sin(phi) * Math.sin(theta) * 0.6;
    positions[i3+2] = cz + r * Math.cos(phi);
  }
  return positions;
}

const formations = { galaxy: generateGalaxy, dna: generateDNA, neural: generateNeural, wave: generateWave, nebula: generateNebula };

// ─── PARTICLE SYSTEM ───
const COUNT = CONFIG.particleCount;
const currentPositions = new Float32Array(COUNT * 3);
const targetPositions = new Float32Array(COUNT * 3);
const velocities = new Float32Array(COUNT * 3);
const basePositions = new Float32Array(COUNT * 3);
const particleSizes = new Float32Array(COUNT);
const particlePhase = new Float32Array(COUNT);
const particleSpeed = new Float32Array(COUNT);

for (let i = 0; i < COUNT; i++) {
  particleSizes[i] = 0.3 + Math.random() * 0.7;
  particlePhase[i] = Math.random() * Math.PI * 2;
  particleSpeed[i] = 0.5 + Math.random() * 1.5;
}

// Initialize with galaxy
const initPos = generateGalaxy(COUNT);
currentPositions.set(initPos);
targetPositions.set(initPos);
basePositions.set(initPos);

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
geometry.setAttribute('aSize', new THREE.BufferAttribute(particleSizes, 1));
geometry.setAttribute('aPhase', new THREE.BufferAttribute(particlePhase, 1));
geometry.setAttribute('aSpeed', new THREE.BufferAttribute(particleSpeed, 1));

const vertexShader = `
  uniform float uTime;
  uniform float uPointSize;
  uniform float uPixelRatio;
  uniform vec3 uColorA;
  uniform vec3 uColorB;
  uniform vec3 uColorC;
  uniform vec3 uMouse3D;
  uniform float uMouseRadius;
  uniform float uMouseStrength;
  uniform float uTransition;

  attribute float aSize;
  attribute float aPhase;
  attribute float aSpeed;

  varying vec3 vColor;
  varying float vAlpha;
  varying float vDist;

  // Simplex-ish noise
  float hash(vec3 p) {
    p = fract(p * vec3(0.1031, 0.1030, 0.0973));
    p += dot(p, p.yxz + 33.33);
    return fract((p.x + p.y) * p.z);
  }

  void main() {
    vec3 pos = position;

    // Subtle organic motion
    float t = uTime * 0.3 * aSpeed;
    pos.x += sin(t + aPhase) * 0.08;
    pos.y += cos(t * 0.7 + aPhase * 2.0) * 0.08;
    pos.z += sin(t * 0.5 + aPhase * 3.0) * 0.08;

    // Mouse interaction - repulsion
    vec3 toMouse = pos - uMouse3D;
    float mouseDist = length(toMouse);
    if (mouseDist < uMouseRadius && mouseDist > 0.001) {
      float force = (1.0 - mouseDist / uMouseRadius);
      force = force * force * uMouseStrength;
      pos += normalize(toMouse) * force;
    }

    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
    gl_Position = projectionMatrix * mvPosition;

    // Size with attenuation
    float size = uPointSize * aSize * uPixelRatio;
    size *= (1.0 / -mvPosition.z);
    // Pulse
    size *= 0.85 + 0.15 * sin(uTime * aSpeed + aPhase);
    gl_PointSize = clamp(size, 1.0, 64.0);

    // Color based on position and attributes
    float colorMix = hash(position * 0.5 + uTime * 0.01);
    float heightMix = (pos.y + 6.0) / 12.0;
    vec3 col;
    if (colorMix < 0.33) {
      col = mix(uColorA, uColorB, heightMix);
    } else if (colorMix < 0.66) {
      col = mix(uColorB, uColorC, heightMix);
    } else {
      col = mix(uColorC, uColorA, heightMix);
    }

    // Proximity to mouse - brighten
    float mouseGlow = smoothstep(uMouseRadius, 0.0, mouseDist) * 0.3;
    col += mouseGlow;

    vColor = col;
    vAlpha = 0.6 + 0.4 * aSize;
    vDist = -mvPosition.z;
  }
`;

const fragmentShader = `
  varying vec3 vColor;
  varying float vAlpha;
  varying float vDist;

  void main() {
    // Soft circle with glow
    vec2 center = gl_PointCoord - 0.5;
    float dist = length(center);

    // Core
    float core = smoothstep(0.5, 0.05, dist);
    // Glow
    float glow = smoothstep(0.5, 0.0, dist) * 0.5;

    float alpha = (core + glow) * vAlpha;

    // Fade distant particles slightly
    float distFade = clamp(1.0 - vDist * 0.02, 0.3, 1.0);
    alpha *= distFade;

    if (alpha < 0.01) discard;

    // Slight color variation in glow
    vec3 finalColor = vColor * (core * 0.7 + 0.3) + vColor * glow * 0.5;

    gl_FragColor = vec4(finalColor, alpha);
  }
`;

const particleMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uPointSize: { value: isMobile ? 25.0 : 35.0 },
    uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
    uColorA: { value: new THREE.Color() },
    uColorB: { value: new THREE.Color() },
    uColorC: { value: new THREE.Color() },
    uMouse3D: { value: new THREE.Vector3(999, 999, 999) },
    uMouseRadius: { value: CONFIG.mouseRadius },
    uMouseStrength: { value: CONFIG.mouseStrength },
    uTransition: { value: 0 }
  },
  vertexShader,
  fragmentShader,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  depthTest: true
});

const particles = new THREE.Points(geometry, particleMaterial);
scene.add(particles);

// ─── CONNECTION LINES ───
const linePositions = new Float32Array(CONFIG.maxConnections * 6);
const lineColors = new Float32Array(CONFIG.maxConnections * 6);
const lineGeometry = new THREE.BufferGeometry();
lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));
lineGeometry.setDrawRange(0, 0);

const lineMaterial = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.15,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
scene.add(lines);

// ─── BACKGROUND STARS ───
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(CONFIG.bgStarCount * 3);
const starSizes = new Float32Array(CONFIG.bgStarCount);

for (let i = 0; i < CONFIG.bgStarCount; i++) {
  const i3 = i * 3;
  const r = 30 + Math.random() * 70;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i3+2] = r * Math.cos(phi);
  starSizes[i] = Math.random();
}

starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeometry.setAttribute('aSize', new THREE.BufferAttribute(starSizes, 1));

const starVertexShader = `
  attribute float aSize;
  uniform float uTime;
  varying float vAlpha;
  void main() {
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    gl_Position = projectionMatrix * mvPos;
    float twinkle = sin(uTime * (aSize * 2.0 + 0.5) + aSize * 100.0) * 0.5 + 0.5;
    gl_PointSize = (0.5 + aSize * 1.5) * (0.6 + twinkle * 0.4);
    gl_PointSize *= (300.0 / -mvPos.z);
    gl_PointSize = clamp(gl_PointSize, 0.5, 4.0);
    vAlpha = 0.3 + twinkle * 0.5;
  }
`;

const starFragmentShader = `
  varying float vAlpha;
  void main() {
    float d = length(gl_PointCoord - 0.5);
    float a = smoothstep(0.5, 0.0, d) * vAlpha;
    gl_FragColor = vec4(0.7, 0.8, 1.0, a);
  }
`;

const starMaterial = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: starVertexShader,
  fragmentShader: starFragmentShader,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// ─── DUST PARTICLES ───
const dustCount = isMobile ? 300 : 800;
const dustGeometry = new THREE.BufferGeometry();
const dustPositions = new Float32Array(dustCount * 3);
const dustVelocities = new Float32Array(dustCount * 3);

for (let i = 0; i < dustCount; i++) {
  const i3 = i * 3;
  dustPositions[i3] = (Math.random()-0.5)*20;
  dustPositions[i3+1] = (Math.random()-0.5)*20;
  dustPositions[i3+2] = (Math.random()-0.5)*20;
  dustVelocities[i3] = (Math.random()-0.5)*0.005;
  dustVelocities[i3+1] = (Math.random()-0.5)*0.005;
  dustVelocities[i3+2] = (Math.random()-0.5)*0.005;
}

dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMaterial = new THREE.PointsMaterial({
  size: 0.03,
  color: 0x6366f1,
  transparent: true,
  opacity: 0.15,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});
const dust = new THREE.Points(dustGeometry, dustMaterial);
scene.add(dust);

// ─── BURST SYSTEM ───
const burstParticles = [];
function createBurst(worldPos) {
  const count = CONFIG.burstCount;
  const positions = new Float32Array(count * 3);
  const vels = [];
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    positions[i3] = worldPos.x;
    positions[i3+1] = worldPos.y;
    positions[i3+2] = worldPos.z;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2*Math.random()-1);
    const speed = 0.5 + Math.random() * 2;
    vels.push(
      Math.sin(phi)*Math.cos(theta)*speed,
      Math.sin(phi)*Math.sin(theta)*speed,
      Math.cos(phi)*speed
    );
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.08,
    color: new THREE.Color().setRGB(...getCurrentColors().a),
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  burstParticles.push({ pts, vels, life: 1.0, positions });
}

// ─── MOUSE INTERACTION ───
const mouse = new THREE.Vector2(999, 999);
const mouse3D = new THREE.Vector3(999, 999, 999);
const raycaster = new THREE.Raycaster();
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

function updateMouse(x, y) {
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, target);
  if (target) mouse3D.copy(target);
}

window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  updateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

function handleClick(x, y) {
  updateMouse(x, y);
  createBurst(mouse3D.clone());
}

window.addEventListener('click', (e) => {
  if (e.target.closest('#ui')) return;
  handleClick(e.clientX, e.clientY);
});
window.addEventListener('touchstart', (e) => {
  if (e.target.closest('#ui')) return;
  handleClick(e.touches[0].clientX, e.touches[0].clientY);
});

// ─── AUDIO ───
let audioCtx = null;
let audioEnabled = false;
let oscillators = [];
let gainNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;
  gainNode.connect(audioCtx.destination);

  const notes = [110, 146.83, 164.81, 220, 293.66, 329.63];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = i < 3 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    const oscGain = audioCtx.createGain();
    oscGain.gain.value = i < 3 ? 0.06 : 0.02;
    osc.connect(oscGain);
    oscGain.connect(gainNode);

    // LFO for subtle modulation
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.1 + i * 0.05;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = freq * 0.005;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();
    osc.start();
    oscillators.push({ osc, lfo, oscGain });
  });
}

function toggleAudio() {
  if (!audioCtx) initAudio();
  audioEnabled = !audioEnabled;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  gainNode.gain.linearRampToValueAtTime(audioEnabled ? 0.5 : 0, audioCtx.currentTime + 0.5);
  document.getElementById('btn-sound').classList.toggle('active', audioEnabled);
}

// ─── MODE SWITCHING ───
let currentMode = 'galaxy';
let transitioning = false;

function switchMode(mode) {
  if (mode === currentMode && !transitioning) return;
  currentMode = mode;
  transitioning = true;

  const newPositions = formations[mode](COUNT);
  targetPositions.set(newPositions);

  // Update UI
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('s-mode').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

// ─── UI BUTTONS ───
document.getElementById('btn-sound').addEventListener('click', toggleAudio);

let autoOrbit = true;
document.getElementById('btn-orbit').addEventListener('click', () => {
  autoOrbit = !autoOrbit;
  controls.autoRotate = autoOrbit;
  document.getElementById('btn-orbit').classList.toggle('active', autoOrbit);
});
document.getElementById('btn-orbit').classList.add('active');

document.getElementById('btn-burst').addEventListener('click', () => {
  createBurst(new THREE.Vector3((Math.random()-0.5)*4, (Math.random()-0.5)*4, (Math.random()-0.5)*4));
});

// ─── LOADING ───
let loaded = false;
const loaderBar = document.getElementById('loaderBar');
loaderBar.style.width = '100%';
setTimeout(() => {
  document.getElementById('loader').classList.add('hide');
  loaded = true;
}, 1200);

// ─── ANIMATION LOOP ───
const clock = new THREE.Clock();
let frameCount = 0;
let lastFPSTime = 0;
let fps = 0;

function updateConnections() {
  const posArr = geometry.attributes.position.array;
  let lineIdx = 0;
  const maxCheck = Math.min(COUNT, 500);
  const colorsArr = getCurrentColors();

  for (let i = 0; i < maxCheck && lineIdx < CONFIG.maxConnections; i++) {
    const i3 = i * 3;
    for (let j = i + 1; j < maxCheck && lineIdx < CONFIG.maxConnections; j++) {
      const j3 = j * 3;
      const dx = posArr[i3] - posArr[j3];
      const dy = posArr[i3+1] - posArr[j3+1];
      const dz = posArr[i3+2] - posArr[j3+2];
      const dist = dx*dx + dy*dy + dz*dz;
      const maxD = CONFIG.connectionDistance * CONFIG.connectionDistance;
      if (dist < maxD) {
        const li = lineIdx * 6;
        linePositions[li] = posArr[i3];
        linePositions[li+1] = posArr[i3+1];
        linePositions[li+2] = posArr[i3+2];
        linePositions[li+3] = posArr[j3];
        linePositions[li+4] = posArr[j3+1];
        linePositions[li+5] = posArr[j3+2];

        const alpha = 1.0 - Math.sqrt(dist) / CONFIG.connectionDistance;
        const c = colorsArr.a;
        lineColors[li] = c[0]*alpha;
        lineColors[li+1] = c[1]*alpha;
        lineColors[li+2] = c[2]*alpha;
        lineColors[li+3] = c[0]*alpha;
        lineColors[li+4] = c[1]*alpha;
        lineColors[li+5] = c[2]*alpha;
        lineIdx++;
      }
    }
  }
  lineGeometry.setDrawRange(0, lineIdx * 2);
  lineGeometry.attributes.position.needsUpdate = true;
  lineGeometry.attributes.color.needsUpdate = true;
  document.getElementById('s-links').textContent = lineIdx;
}

function animate() {
  requestAnimationFrame(animate);
  if (!loaded) return;

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // FPS counter
  frameCount++;
  if (elapsed - lastFPSTime >= 0.5) {
    fps = Math.round(frameCount / (elapsed - lastFPSTime));
    document.getElementById('s-fps').textContent = fps;
    frameCount = 0;
    lastFPSTime = elapsed;
  }
  document.getElementById('s-nodes').textContent = COUNT;

  // Color cycling
  paletteT += CONFIG.colorCycleSpeed;
  if (paletteT >= 1) {
    paletteT = 0;
    currentPalette = (currentPalette + 1) % PALETTES.length;
  }
  const colors = getCurrentColors();
  particleMaterial.uniforms.uColorA.value.setRGB(colors.a[0], colors.a[1], colors.a[2]);
  particleMaterial.uniforms.uColorB.value.setRGB(colors.b[0], colors.b[1], colors.b[2]);
  particleMaterial.uniforms.uColorC.value.setRGB(colors.c[0], colors.c[1], colors.c[2]);
  scene.background = new THREE.Color().setRGB(colors.bg[0], colors.bg[1], colors.bg[2]);

  // Update particle positions (smooth transition)
  const posArr = geometry.attributes.position.array;
  const speed = CONFIG.transitionSpeed;
  let maxDelta = 0;
  for (let i = 0; i < COUNT * 3; i++) {
    const diff = targetPositions[i] - posArr[i];
    posArr[i] += diff * speed * (1 + Math.abs(diff) * 0.5);
    maxDelta = Math.max(maxDelta, Math.abs(diff));
  }
  if (maxDelta < 0.01) transitioning = false;
  geometry.attributes.position.needsUpdate = true;

  // Mode-specific animation on targets
  const tgt = targetPositions;
  if (currentMode === 'wave') {
    const gridSize = Math.ceil(Math.sqrt(COUNT));
    const spacing = 10 / gridSize;
    for (let i = 0; i < COUNT; i++) {
      const i3 = i * 3;
      const gx = (i % gridSize) * spacing - 5;
      const gz = Math.floor(i / gridSize) * spacing - 5;
      const dist = Math.sqrt(gx*gx + gz*gz);
      tgt[i3+1] = Math.sin(dist * 1.5 - elapsed * 1.5) * Math.cos(gx * 0.5 + elapsed * 0.3) * 1.2;
    }
  } else if (currentMode === 'dna') {
    const length = 12;
    for (let i = 0; i < COUNT; i++) {
      const i3 = i * 3;
      const t = (i / COUNT) * length - length / 2;
      const strand = i % 3;
      const spin = elapsed * 0.5;
      if (strand < 2) {
        const angle = t * 1.2 + (strand === 0 ? 0 : Math.PI) + spin;
        tgt[i3] = Math.cos(angle) * 1.5;
        tgt[i3+2] = Math.sin(angle) * 1.5;
      }
    }
  } else if (currentMode === 'galaxy') {
    particles.rotation.y = elapsed * 0.05;
  } else {
    particles.rotation.y *= 0.99;
  }

  // Update uniforms
  particleMaterial.uniforms.uTime.value = elapsed;
  particleMaterial.uniforms.uMouse3D.value.copy(mouse3D);
  starMaterial.uniforms.uTime.value = elapsed;

  // Update dust
  const dpos = dustGeometry.attributes.position.array;
  for (let i = 0; i < dustCount * 3; i++) {
    dpos[i] += dustVelocities[i];
    if (Math.abs(dpos[i]) > 10) dustVelocities[i] *= -1;
  }
  dustGeometry.attributes.position.needsUpdate = true;
  dustMaterial.color.setRGB(colors.a[0]*0.5, colors.a[1]*0.5, colors.a[2]*0.5);

  // Update bursts
  for (let b = burstParticles.length - 1; b >= 0; b--) {
    const burst = burstParticles[b];
    burst.life -= delta * 1.2;
    if (burst.life <= 0) {
      scene.remove(burst.pts);
      burst.pts.geometry.dispose();
      burst.pts.material.dispose();
      burstParticles.splice(b, 1);
      continue;
    }
    const bpos = burst.pts.geometry.attributes.position.array;
    const bCount = bpos.length / 3;
    for (let i = 0; i < bCount; i++) {
      const i3 = i * 3;
      bpos[i3] += burst.vels[i3] * delta;
      bpos[i3+1] += burst.vels[i3+1] * delta;
      bpos[i3+2] += burst.vels[i3+2] * delta;
      burst.vels[i3] *= 0.97;
      burst.vels[i3+1] *= 0.97;
      burst.vels[i3+2] *= 0.97;
    }
    burst.pts.geometry.attributes.position.needsUpdate = true;
    burst.pts.material.opacity = burst.life;
    burst.pts.material.color.setRGB(
      colors.a[0] * burst.life + colors.b[0] * (1-burst.life),
      colors.a[1] * burst.life + colors.b[1] * (1-burst.life),
      colors.a[2] * burst.life + colors.b[2] * (1-burst.life)
    );
  }

  // Update connections every few frames
  if (frameCount % 3 === 0) updateConnections();

  // Update audio based on mode
  if (audioEnabled && audioCtx && oscillators.length > 0) {
    const modeFreqs = {
      galaxy: [110, 146.83, 164.81, 220, 293.66, 329.63],
      dna: [130.81, 164.81, 196, 261.63, 329.63, 392],
      neural: [146.83, 185, 220, 293.66, 369.99, 440],
      wave: [98, 130.81, 196, 261.63, 392, 523.25],
      nebula: [82.41, 110, 146.83, 196, 261.63, 349.23]
    };
    const freqs = modeFreqs[currentMode] || modeFreqs.galaxy;
    oscillators.forEach((o, i) => {
      o.osc.frequency.linearRampToValueAtTime(freqs[i], audioCtx.currentTime + 2);
    });
  }

  controls.update();
  composer.render();
}

animate();

// ─── RESIZE ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  particleMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
});

// ─── KEYBOARD SHORTCUTS ───
window.addEventListener('keydown', (e) => {
  const modes = ['galaxy', 'dna', 'neural', 'wave', 'nebula'];
  const num = parseInt(e.key);
  if (num >= 1 && num <= 5) switchMode(modes[num - 1]);
  if (e.key === 's' || e.key === 'S') toggleAudio();
  if (e.key === 'o' || e.key === 'O') {
    autoOrbit = !autoOrbit;
    controls.autoRotate = autoOrbit;
    document.getElementById('btn-orbit').classList.toggle('active', autoOrbit);
  }
  if (e.key === ' ') {
    e.preventDefault();
    createBurst(new THREE.Vector3((Math.random()-0.5)*4, (Math.random()-0.5)*4, (Math.random()-0.5)*4));
  }
});

console.log('%c OneWave AI — Neural Cosmos ', 'background: linear-gradient(135deg, #6366f1, #a78bfa); color: white; font-size: 14px; padding: 8px 16px; border-radius: 8px;');
</script>
